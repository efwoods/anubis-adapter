services:
  adapter-api:
    build: .
    env_file: .env
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/workspace/.cache/huggingface
      - adapters:/workspace/adapters

volumes:
  adapters:
